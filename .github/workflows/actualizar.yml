name: Actualizar Catálogo OPDS

on:
  schedule:
    - cron: '0 0 * * *' # Se ejecuta automáticamente todos los días a medianoche
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña "Actions" de GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Copiar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ejecutar script generador
        run: python generador.py

      - name: Guardar cambios en el repositorio
        run: |
          git config --global user.name "Bot OPDS"
          git config --global user.email "bot@users.noreply.github.com"
          git add catalogo.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualizar catálogo OPDS automático" && git push)
